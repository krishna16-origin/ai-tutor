<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex AI - Learn Anything</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        chat: {
                            bg: '#212121',
                            sidebar: '#171717',
                            input: '#2f2f2f',
                            border: '#383838',
                            hover: '#2f2f2f',
                            user: '#2f2f2f',
                            text: '#ececec',
                            muted: '#b4b4b4'
                        }
                    }
                }
            }
        };
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #acacbe; }

        body { background-color: #212121; color: #ececec; }

        .prose p { margin-bottom: 1rem; line-height: 1.7; }
        .prose pre { margin: 1rem 0; background-color: #0d0d0d; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #383838; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9em; }
        .prose th { border-bottom: 2px solid #383838; padding: 0.75rem; text-align: left; font-weight: 600; background: #2a2a2a; }
        .prose td { border-bottom: 1px solid #383838; padding: 0.75rem; text-align: left; }
        .prose tr:hover { background: #2a2a2a; }
        .prose blockquote { border-left: 4px solid #383838; padding-left: 1rem; color: #b4b4b4; font-style: italic; margin: 1rem 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin: 1rem 0; }
        .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
        .prose h1 { font-size: 1.5rem; }
        .prose h2 { font-size: 1.25rem; }
        .prose h3 { font-size: 1.1rem; }

        .blinking-cursor::after {
            content: '.';
            animation: blink 1s step-end infinite;
            margin-left: 4px;
            font-size: 0.8em;
            color: #ececec;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        textarea { resize: none; overflow-y: hidden; max-height: 200px; }
        textarea::-webkit-scrollbar { display: none; }

        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        .mermaid-container, .plotly-container, .threejs-container, .quiz-container {
            margin: 1.5rem 0;
            background: #1a1a1a;
            border: 1px solid #383838;
            border-radius: 0.75rem;
            padding: 1.25rem;
            overflow: hidden;
            width: 100%;
        }
        .mermaid-container { display: flex; justify-content: center; }
        .threejs-container canvas { width: 100% !important; height: 300px !important; }

        .quiz-container { border: 2px solid #3b82f644; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .quiz-question-box { background: #262626; border: 1px solid #383838; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1.5rem; transition: transform 0.2s; }
        .quiz-question-box:hover { border-color: #4b5563; }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            border: 1px solid #383838;
            background: #2f2f2f;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        .quiz-option:hover:not(.disabled) { background: #3d3d3d; border-color: #60a5fa; }
        .quiz-option.selected { background: #3b82f622; border-color: #3b82f6; box-shadow: inset 0 0 0 1px #3b82f6; }
        .quiz-option.correct { background: #10b98122 !important; border-color: #10b981 !important; color: #34d399; }
        .quiz-option.incorrect { background: #ef444422 !important; border-color: #ef4444 !important; color: #f87171; }
        .quiz-submit-btn {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: block;
            margin: 1.5rem auto 0;
        }
        .quiz-submit-btn:hover { background: #2563eb; transform: translateY(-1px); }
        .quiz-submit-btn:disabled { background: #4b5563; cursor: not-allowed; transform: none; }

        @media (min-width: 768px) {
            .sidebar-desktop-closed { width: 0 !important; border-right-width: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
        }
        @media (max-width: 767px) {
            .sidebar-mobile-open { transform: translateX(0) !important; }
        }
    </style>
</head>

<body class="h-screen flex font-sans overflow-hidden text-sm md:text-base">
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="bg-chat-sidebar border-r border-chat-border flex flex-col shrink-0 transition-all duration-300 ease-in-out z-30 fixed md:relative h-full w-[260px] -translate-x-full md:translate-x-0 overflow-hidden">
        <div class="p-3 flex items-center justify-between">
            <button onclick="location.reload()" class="flex-1 flex items-center gap-2 px-3 py-2 text-sm text-chat-text hover:bg-chat-hover rounded-lg transition-colors border border-chat-border group whitespace-nowrap">
                <i data-lucide="plus" class="w-4 h-4 text-chat-muted group-hover:text-chat-text shrink-0"></i>
                New lesson
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2 text-chat-muted hover:text-chat-text rounded-md hover:bg-chat-hover shrink-0">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-6 custom-scrollbar w-[260px]">
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-chat-muted uppercase tracking-wider px-2">Settings</h3>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Learner Level</label>
                    <select id="setting-level" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500 cursor-pointer">
                        <option value="Beginner">Beginner</option>
                        <option value="Student" selected>Student</option>
                        <option value="College">College</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Researcher">Researcher</option>
                        <option value="Mariana Trench Mode">Mariana Trench</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Provider Model</label>
                    <select id="setting-provider" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500 cursor-pointer">
                        <option value="auto">Auto Route</option>
                        <option value="groq">GPT 4.5</option>
                        <option value="glm">GLM 5.2 </option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Language</label>
                    <input type="text" id="setting-language" value="English" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
                </div>
            </div>
        </div>

        <div class="p-3 border-t border-chat-border w-[260px]">
            <div class="flex items-center gap-2 px-3 py-2 text-sm rounded-lg hover:bg-chat-hover cursor-pointer transition-colors">
                <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-medium text-xs shrink-0">U</div>
                <span class="font-medium text-chat-text truncate">User</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full bg-chat-bg min-w-0">
        <header class="flex items-center justify-between p-3 border-b border-chat-border text-chat-text bg-chat-bg z-10 shrink-0">
            <div class="flex items-center gap-2">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-chat-hover rounded-md text-chat-muted hover:text-chat-text transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2 ml-1">
                    <i data-lucide="brain" class="w-5 h-5 text-blue-500"></i>
                    <span class="font-medium tracking-tight">Cortex AI</span>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 hover:bg-chat-hover rounded-md text-chat-muted hover:text-chat-text md:hidden">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto scroll-smooth">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center px-4 text-center max-w-2xl mx-auto opacity-100 transition-opacity duration-500 min-h-[60vh]">
                <div class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center mb-6 shadow-lg">
                    <i data-lucide="brain-circuit" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-semibold mb-8">How can I help you learn today?</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full">
                    <button onclick="prefill('Teach me about Quantum Entanglement', 'teach')" class="p-4 border border-chat-border rounded-xl text-left hover:bg-chat-hover transition-colors">
                        <div class="font-medium text-sm text-chat-text">Quantum Entanglement</div>
                        <div class="text-xs text-chat-muted mt-1">Explain the core concepts simply</div>
                    </button>
                    <button onclick="prefill('Derive the Navier-Stokes equations', 'deep')" class="p-4 border border-chat-border rounded-xl text-left hover:bg-chat-hover transition-colors">
                        <div class="font-medium text-sm text-chat-text">Navier-Stokes</div>
                        <div class="text-xs text-chat-muted mt-1">Deep dive with Mariana Mode</div>
                    </button>
                </div>
            </div>
            <div id="chat-transcript" class="pb-6 pt-6 flex flex-col gap-6 w-full"></div>
        </div>

        <div class="w-full bg-chat-bg pt-2 pb-6 px-4 md:px-8 shrink-0 z-10 border-t border-chat-border md:border-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div class="flex items-center gap-2 mb-3 overflow-x-auto pb-1 hide-scrollbar">
                    <button onclick="setMode('teach')" id="mode-teach" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-chat-input text-chat-text border border-chat-border hover:bg-gray-700 transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="graduation-cap" class="w-3.5 h-3.5"></i> Teach
                    </button>
                    <button onclick="setMode('deep')" id="mode-deep" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="waves" class="w-3.5 h-3.5"></i> Mariana Dive
                    </button>
                    <button onclick="setMode('connectors')" id="mode-connectors" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Analyze Source
                    </button>
                    <button onclick="setMode('quiz')" id="mode-quiz" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> Quiz Me
                    </button>
                </div>

                <div id="context-options" class="hidden flex flex-wrap items-center gap-3 mb-3 px-1 transition-all">
                    <div id="opt-task" class="hidden flex items-center gap-2 text-xs text-chat-muted">
                        <label>Task:</label>
                        <select id="input-task" class="bg-chat-input border border-chat-border rounded px-2 py-1 focus:outline-none text-chat-text">
                            <option value="summary">Summary</option>
                            <option value="deep_explanation" selected>Deep Explanation</option>
                            <option value="formula_extraction">Extract Formulas</option>
                            <option value="quiz">Generate Quiz</option>
                        </select>
                    </div>
                    <div id="opt-num" class="hidden flex items-center gap-2 text-xs text-chat-muted">
                        <label>Questions:</label>
                        <input type="number" id="input-num" min="1" max="20" value="5" class="bg-chat-input border border-chat-border rounded px-2 py-1 w-16 focus:outline-none text-chat-text">
                    </div>
                </div>

                <form id="chat-form" class="relative flex items-end bg-chat-input rounded-2xl border border-chat-border shadow-lg focus-within:border-gray-500 transition-colors p-1">
                    <textarea id="main-input" rows="1" placeholder="Enter a topic to learn..." class="w-full bg-transparent text-chat-text text-base px-4 py-3 focus:outline-none placeholder-chat-muted resize-none custom-scrollbar m-0" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    <button type="submit" id="submit-btn" class="mb-2 mr-2 p-2 bg-white text-black rounded-xl hover:bg-gray-200 disabled:bg-chat-border disabled:text-chat-muted transition-colors flex-shrink-0">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <template id="tpl-user-msg">
        <div class="w-full max-w-3xl mx-auto px-4 flex justify-end mb-4">
            <div class="bg-[#2f2f2f] text-chat-text rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap text-sm md:text-base border border-[#383838]"></div>
        </div>
    </template>

    <template id="tpl-ai-msg">
        <div class="w-full max-w-3xl mx-auto px-4 flex gap-4 mb-4">
            <div class="w-8 h-8 rounded-full border border-chat-border flex items-center justify-center shrink-0 bg-white text-black">
                <i data-lucide="sparkles" class="w-4 h-4"></i>
            </div>
            <div class="flex-1 min-w-0">
                <details class="group mb-3 border border-chat-border rounded-lg bg-[#1a1a1a] text-xs overflow-hidden hidden" id="thought-accordion">
                    <summary class="px-3 py-2 cursor-pointer flex items-center gap-2 text-chat-muted hover:text-chat-text transition-colors">
                        <i data-lucide="chevron-right" class="w-3 h-3 group-open:rotate-90 transition-transform"></i>
                        <span class="font-mono" id="thought-status">Analyzing request...</span>
                        <i data-lucide="loader-circle" class="w-3 h-3 animate-spin ml-auto" id="thought-spinner"></i>
                    </summary>
                    <div class="px-3 pb-3 font-mono text-chat-muted space-y-1 max-h-32 overflow-y-auto custom-scrollbar" id="thought-logs"></div>
                </details>
                <div class="prose prose-invert max-w-none text-chat-text prose-sm md:prose-base content-area"></div>
                <div class="flex items-center gap-3 mt-4 mb-2 opacity-0 transition-opacity action-bar hidden">
                    <button class="text-chat-muted hover:text-chat-text transition-colors p-1" title="Copy" onclick="copyText(this)">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <span class="text-[10px] uppercase font-mono px-2 py-0.5 rounded bg-chat-input text-chat-muted border border-chat-border provider-badge"></span>
                </div>
            </div>
        </div>
    </template>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });

        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
        });

        if (window.markedGfmHeadingId) {
            marked.use(window.markedGfmHeadingId.gfmHeadingId());
        }

        marked.setOptions({
            gfm: true,
            breaks: true,
            mangle: false,
            headerIds: false
        });

        let currentMode = 'teach';
        let isGenerating = false;
        let apiUrl = 'https://ai-tutor-mhua.onrender.com';
        let simulationInterval;
        let streamingInterval;

        const ui = {
            input: document.getElementById('main-input'),
            form: document.getElementById('chat-form'),
            submitBtn: document.getElementById('submit-btn'),
            transcript: document.getElementById('chat-transcript'),
            emptyState: document.getElementById('empty-state'),
            contextOptions: document.getElementById('context-options'),
            optTask: document.getElementById('opt-task'),
            optNum: document.getElementById('opt-num')
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            if (window.innerWidth >= 768) {
                sidebar.classList.toggle('sidebar-desktop-closed');
            } else {
                sidebar.classList.toggle('sidebar-mobile-open');
                backdrop.classList.toggle('hidden');
            }
        }

        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');

            if (window.innerWidth >= 768) {
                sidebar.classList.remove('sidebar-mobile-open');
                backdrop.classList.add('hidden');
            } else {
                sidebar.classList.remove('sidebar-desktop-closed');
            }
        });

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                ui.form.dispatchEvent(new Event('submit'));
            }
        }

        function setMode(mode) {
            if (isGenerating) return;

            currentMode = mode;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.className = 'mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap';
            });

            const active = document.getElementById(`mode-${mode}`);
            active.className = 'mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-chat-input text-chat-text border border-chat-border transition-colors flex items-center gap-1.5 whitespace-nowrap shadow-sm';

            ui.contextOptions.classList.add('hidden');
            ui.optTask.classList.add('hidden');
            ui.optNum.classList.add('hidden');

            if (mode === 'teach') ui.input.placeholder = "Enter a topic to learn...";
            else if (mode === 'deep') ui.input.placeholder = "Enter advanced topic for Mariana Mode...";
            else if (mode === 'connectors') {
                ui.input.placeholder = "Paste source text here...";
                ui.contextOptions.classList.remove('hidden');
                ui.optTask.classList.remove('hidden');
            } else if (mode === 'quiz') {
                ui.input.placeholder = "Enter topic for quiz...";
                ui.contextOptions.classList.remove('hidden');
                ui.optNum.classList.remove('hidden');
            }

            ui.input.focus();
        }

        function prefill(text, mode) {
            setMode(mode);
            ui.input.value = text;
            autoResize(ui.input);
            ui.form.dispatchEvent(new Event('submit'));
        }

        function appendUserMessage(text) {
            ui.emptyState.classList.add('hidden');
            ui.emptyState.classList.add('md:hidden');

            const tpl = document.getElementById('tpl-user-msg').content.cloneNode(true);
            tpl.querySelector('div > div').textContent = text;
            ui.transcript.appendChild(tpl);
            scrollToBottom();
        }

        function createAIMessage() {
            ui.emptyState.classList.add('hidden');
            ui.emptyState.classList.add('md:hidden');

            const tpl = document.getElementById('tpl-ai-msg').content.cloneNode(true);
            const container = document.createElement('div');
            container.appendChild(tpl);
            ui.transcript.appendChild(container.firstElementChild);

            lucide.createIcons();
            scrollToBottom();

            return ui.transcript.lastElementChild;
        }

        function scrollToBottom() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function startThinking(aiNode) {
            const accordion = aiNode.querySelector('#thought-accordion');
            const logs = aiNode.querySelector('#thought-logs');
            const status = aiNode.querySelector('#thought-status');

            accordion.classList.remove('hidden');
            accordion.open = true;

            const steps = ["Initializing...", "Formatting...", "Selecting model...", "Generating...", "Awaiting stream..."];
            let i = 0;

            simulationInterval = setInterval(() => {
                if (i < steps.length) {
                    const log = document.createElement('div');
                    log.textContent = `> ${steps[i]}`;
                    logs.appendChild(log);
                    status.textContent = steps[i];
                    logs.scrollTop = logs.scrollHeight;
                    i++;
                }
            }, 800);
        }

        function stopThinking(aiNode) {
            clearInterval(simulationInterval);

            const accordion = aiNode.querySelector('#thought-accordion');
            const spinner = aiNode.querySelector('#thought-spinner');
            const status = aiNode.querySelector('#thought-status');

            spinner.classList.remove('animate-spin');
            spinner.setAttribute('data-lucide', 'check-circle');
            status.textContent = "Generation complete";
            accordion.open = false;

            lucide.createIcons();
        }

        function processTextWithMath(text) {
            const mathBlocks = [];
            let counter = 0;

            text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
                const id = `__MATH_BLOCK_${counter}__`;
                mathBlocks.push({ id, math: p1, display: true });
                counter++;
                return id;
            });

            text = text.replace(/\\\[([\s\S]+?)\\\]/g, (match, p1) => {
                const id = `__MATH_BLOCK_${counter}__`;
                mathBlocks.push({ id, math: p1, display: true });
                counter++;
                return id;
            });

            text = text.replace(/(?<!\$)\$([^\s$](?:[^$]*?[^\s$])?)\$(?!\$)/g, (match, p1) => {
                const id = `__MATH_BLOCK_${counter}__`;
                mathBlocks.push({ id, math: p1, display: false });
                counter++;
                return id;
            });

            text = text.replace(/\\\(([\s\S]+?)\\\)/g, (match, p1) => {
                const id = `__MATH_BLOCK_${counter}__`;
                mathBlocks.push({ id, math: p1, display: false });
                counter++;
                return id;
            });

            let html = marked.parse(text);

            mathBlocks.forEach(block => {
                try {
                    const mathHtml = katex.renderToString(block.math, {
                        displayMode: block.display,
                        throwOnError: false
                    });
                    html = html.replace(block.id, mathHtml);
                } catch (e) {
                    html = html.replace(block.id, `<span class="text-red-500 font-mono">${block.math}</span>`);
                }
            });

            return html;
        }

        function renderVisuals(container) {
            const blocks = container.querySelectorAll('pre code');

            blocks.forEach((block) => {
                const lang = block.className || '';
                const content = block.textContent.trim();
                const pre = block.parentElement;

                const isMermaidLang = lang.includes('language-mermaid') || lang.includes('mermaid');
                const hasMermaidKeyword = /^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie|gitGraph|journey|C4Context|mindmap|timeline|quadrantChart|xychart-beta)\b/i.test(content);

                if (isMermaidLang || hasMermaidKeyword) {
                    const id = `mermaid_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
                    const div = document.createElement('div');
                    div.className = 'mermaid-container';
                    div.id = id;
                    pre.replaceWith(div);

                    setTimeout(async () => {
                        try {
                            const { svg } = await mermaid.render(`${id}_svg`, content);
                            div.innerHTML = svg;
                        } catch (err) {
                            console.error("Mermaid Render Error:", err);
                            div.innerHTML = `<div class="text-xs text-red-500 p-2 bg-red-900/20 rounded font-mono overflow-auto max-h-32">Mermaid Syntax Error:<br>${err.message}</div>`;
                        }
                    }, 100);
                } else if (lang.includes('plotly') || (content.includes('"data"') && content.includes('"layout"'))) {
                    try {
                        const data = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'plotly-container';
                        pre.replaceWith(div);
                        Plotly.newPlot(div, data.data || [], data.layout || { template: 'plotly_dark' }, { responsive: true });
                    } catch (e) {
                        if (lang.includes('plotly')) pre.innerHTML = `<div class="text-xs text-red-500 font-mono">Plotly Data Error</div>`;
                    }
                } else if (lang.includes('threejs') || (content.includes('"type"') && content.includes('"color"'))) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'threejs-container';
                        pre.replaceWith(div);
                        initThreeJS(div, spec);
                    } catch (e) {}
                }
            });

            renderInteractiveQuiz(container);
        }

        function renderInteractiveQuiz(container) {
            const rawText = container.getAttribute('data-raw') || "";
            const quizStart = rawText.search(/(?:#+\s*|\*\*?)(?:Quiz|Practice Problems|Test Your Knowledge|Knowledge Check|Pop Quiz)(?:\*\*?)?/i);

            if (quizStart === -1) {
                if (!rawText.match(/(?:^|\n)\s*1[\.\)]\s+.+\n\s*(?:[a-d][\)\.]|\([a-d]\))/i)) return;
            }

            const quizContent = quizStart !== -1 ? rawText.substring(quizStart) : rawText;
            const questions = [];
            const qBlocks = quizContent.split(/(?:^|\n)\s*\d+[\.\)]\s+/).filter(b => b.trim().length > 5);

            qBlocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 2) return;

                const questionText = lines[0];
                const options = lines.filter(l => /^\s*(?:[a-d][\)\.]|\([a-d]\))/i.test(l));

                if (questionText && options.length >= 2) {
                    questions.push({
                        question: questionText,
                        options: options.map(o => o.replace(/^\s*(?:[a-d][\)\.]|\([a-d]\))\s*/i, '').trim()),
                        correct: 0,
                        selectedIndex: null
                    });
                }
            });

            if (questions.length === 0) return;

            const answerKeyMatch = rawText.match(/(?:Answer Key|Answers|Correct Answers|Solutions):?([\s\S]*)/i);
            if (answerKeyMatch) {
                const keySection = answerKeyMatch[1];
                const mappedKeys = [...keySection.matchAll(/\b(\d+)[\.\-\):]\s*([a-d])\b/gi)];

                if (mappedKeys.length > 0) {
                    mappedKeys.forEach(match => {
                        const targetIdx = parseInt(match[1]) - 1;
                        const ansLetter = match[2].toLowerCase();
                        if (questions[targetIdx]) questions[targetIdx].correct = ansLetter.charCodeAt(0) - 97;
                    });
                } else {
                    const fallbackKeys = keySection.match(/\b([a-d])\b/gi);
                    if (fallbackKeys) {
                        fallbackKeys.forEach((key, idx) => {
                            if (questions[idx]) questions[idx].correct = key.toLowerCase().charCodeAt(0) - 97;
                        });
                    }
                }
            }

            const quizWrapper = document.createElement('div');
            quizWrapper.className = 'quiz-container';
            quizWrapper.innerHTML = `
                <div class="flex items-center gap-3 mb-6 border-b border-blue-500/20 pb-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 shrink-0">
                        <i data-lucide="help-circle"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-white m-0">Knowledge Check</h3>
                        <p class="text-xs text-chat-muted m-0">Test what you've just learned</p>
                    </div>
                </div>
                <div id="quiz-questions-container"></div>
                <div class="flex flex-col items-center gap-4 mt-8">
                    <button id="quiz-submit-btn" class="quiz-submit-btn">Submit Quiz</button>
                    <div id="quiz-overall-feedback" class="hidden text-center p-4 rounded-xl w-full"></div>
                </div>
            `;

            const qContainer = quizWrapper.querySelector('#quiz-questions-container');
            const submitBtn = quizWrapper.querySelector('#quiz-submit-btn');
            const overallFeedback = quizWrapper.querySelector('#quiz-overall-feedback');

            questions.forEach((q, qIdx) => {
                const qBox = document.createElement('div');
                qBox.className = 'quiz-question-box';
                qBox.innerHTML = `<p class="font-semibold text-chat-text mb-4 m-0"><span class="text-blue-400 mr-2">Q${qIdx + 1}.</span>${processTextWithMath(q.question).replace(/<p>|<\/p>/g, '')}</p>`;

                const optList = document.createElement('div');
                optList.className = 'space-y-2';

                q.options.forEach((opt, oIdx) => {
                    const optBtn = document.createElement('button');
                    optBtn.className = 'quiz-option';
                    optBtn.innerHTML = `
                        <span class="w-6 h-6 rounded-full border border-chat-border flex items-center justify-center text-[10px] font-bold shrink-0 opt-indicator">${String.fromCharCode(65 + oIdx)}</span>
                        <span class="text-sm">${processTextWithMath(opt).replace(/<p>|<\/p>/g, '')}</span>
                    `;
                    optBtn.onclick = () => {
                        if (submitBtn.disabled) return;
                        optList.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('selected'));
                        optBtn.classList.add('selected');
                        q.selectedIndex = oIdx;
                    };
                    optList.appendChild(optBtn);
                });

                qBox.appendChild(optList);
                qContainer.appendChild(qBox);
            });

            submitBtn.onclick = () => {
                let score = 0;
                let allAnswered = true;

                questions.forEach(q => {
                    if (q.selectedIndex === null) allAnswered = false;
                });

                if (!allAnswered) {
                    alert("Please answer all questions before submitting!");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "Quiz Completed";

                const qBoxes = qContainer.querySelectorAll('.quiz-question-box');

                questions.forEach((q, idx) => {
                    const qBox = qBoxes[idx];
                    const opts = qBox.querySelectorAll('.quiz-option');

                    opts[q.correct].classList.add('correct');

                    if (q.selectedIndex !== q.correct) opts[q.selectedIndex].classList.add('incorrect');
                    else score++;

                    const feedback = document.createElement('div');
                    feedback.className = `mt-4 text-xs p-3 rounded-lg ${q.selectedIndex === q.correct ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`;
                    feedback.innerHTML = q.selectedIndex === q.correct
                        ? `<strong>Correct!</strong> Great job.`
                        : `<strong>Incorrect.</strong> The correct answer was ${String.fromCharCode(65 + q.correct)}.`;
                    qBox.appendChild(feedback);
                });

                overallFeedback.classList.remove('hidden');

                const percentage = Math.round((score / questions.length) * 100);
                overallFeedback.className = `text-center p-4 rounded-xl w-full ${percentage >= 70 ? 'bg-green-500/10 text-green-400' : 'bg-blue-500/10 text-blue-400'}`;
                overallFeedback.innerHTML = `<h4 class="font-bold text-lg m-0">Your Score: ${score}/${questions.length} (${percentage}%)</h4><p class="text-sm mt-1 m-0">${percentage >= 70 ? 'Excellent! You have a solid grasp of this topic.' : 'Good effort! Review the material to master these concepts.'}</p>`;

                lucide.createIcons();
                scrollToBottom();
            };

            container.appendChild(quizWrapper);
            lucide.createIcons();
        }

        function initThreeJS(container, spec) {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, container.clientWidth / 300, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

            renderer.setSize(container.clientWidth, 300);
            container.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(10, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            let mesh;

            if (spec.type === 'sphere') {
                mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 32, 32),
                    new THREE.MeshPhongMaterial({ color: spec.color || 0x0000ff })
                );
            } else {
                mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(),
                    new THREE.MeshPhongMaterial({ color: spec.color || 0x00ff00 })
                );
            }

            scene.add(mesh);
            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.01;
                mesh.rotation.y += 0.01;
                renderer.render(scene, camera);
            }

            animate();
        }

        function streamMarkdown(aiNode, text, provider) {
            const contentArea = aiNode.querySelector('.content-area');
            const actionBar = aiNode.querySelector('.action-bar');
            const badge = aiNode.querySelector('.provider-badge');

            contentArea.classList.add('blinking-cursor');
            badge.textContent = provider;

            let index = 0;
            const chunkSize = 15;

            function tick() {
                if (index < text.length) {
                    const currentText = text.slice(0, index + chunkSize);
                    contentArea.innerHTML = processTextWithMath(currentText);
                    index += chunkSize;
                    scrollToBottom();
                    streamingInterval = requestAnimationFrame(tick);
                } else {
                    contentArea.innerHTML = processTextWithMath(text);
                    contentArea.classList.remove('blinking-cursor');
                    contentArea.setAttribute('data-raw', text);

                    renderVisuals(contentArea);

                    actionBar.classList.remove('hidden');
                    setTimeout(() => actionBar.classList.replace('opacity-0', 'opacity-100'), 100);

                    isGenerating = false;
                    ui.submitBtn.disabled = false;
                    ui.submitBtn.innerHTML = '<i data-lucide="arrow-up" class="w-5 h-5"></i>';

                    lucide.createIcons();
                    ui.input.focus();
                }
            }

            tick();
        }

        function copyText(btn) {
            const raw = btn.closest('.flex-1').querySelector('.content-area').getAttribute('data-raw');
            if (!raw) return;

            navigator.clipboard.writeText(raw).then(() => {
                btn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i>';
                lucide.createIcons();

                setTimeout(() => {
                    btn.innerHTML = '<i data-lucide="copy" class="w-4 h-4"></i>';
                    lucide.createIcons();
                }, 2000);
            });
        }

        ui.form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const text = ui.input.value.trim();
            if (!text || isGenerating) return;

            isGenerating = true;
            ui.submitBtn.disabled = true;
            ui.submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>';
            lucide.createIcons();

            appendUserMessage(text);
            ui.input.value = '';
            autoResize(ui.input);

            const aiNode = createAIMessage();
            startThinking(aiNode);

            const level = document.getElementById('setting-level').value;
            const provider = document.getElementById('setting-provider').value;
            const language = document.getElementById('setting-language').value;

            let endpoint = '';
            let payload = { level, provider, language };

            if (currentMode === 'teach') {
                endpoint = '/teach';
                payload.topic = text;
            } else if (currentMode === 'deep') {
                endpoint = '/learn-deep';
                payload.topic = text;
                payload.level = "Mariana Trench Mode";
            } else if (currentMode === 'connectors') {
                endpoint = '/connectors';
                payload.source_text = text;
                payload.task = document.getElementById('input-task').value;
            } else if (currentMode === 'quiz') {
                endpoint = '/quiz';
                payload.topic = text;
                payload.num_questions = parseInt(document.getElementById('input-num').value);
            }

            if (!apiUrl) {
                setTimeout(() => {
                    stopThinking(aiNode);

                    let dummyText = [
                        "Here is a simulated response with advanced parsing.",
                        "",
                        "### Math Test",
                        "Inline math works safely: $E = mc^2$ without italic conflicts.",
                        "",
                        "Display equation:",
                        "$$ x = \\\\frac{-b \\\\pm \\\\sqrt{b^2 - 4ac}}{2a} $$",
                        "",
                        "### Diagram Test",
                        "```mermaid",
                        "flowchart TD",
                        "    A[Start] --> B{Choose a path}",
                        "    B -->|Visual| C[Render Mermaid]",
                        "    B -->|Data| D[Render Plotly]",
                        "    C --> E[Done]",
                        "    D --> E",
                        "```",
                        "",
                        "### Chart Test",
                        "```plotly",
                        "{",
                        "  \"data\": [",
                        "    { \"x\": [\"A\", \"B\", \"C\"], \"y\": [10, 15, 7], \"type\": \"bar\", \"marker\": { \"color\": \"#3b82f6\" } }",
                        "  ],",
                        "  \"layout\": { \"title\": \"Sample Render\", \"paper_bgcolor\": \"#1a1a1a\", \"plot_bgcolor\": \"#1a1a1a\", \"font\": { \"color\": \"#ececec\" } }",
                        "}",
                        "```",
                        "",
                        "### 3D Test",
                        "```threejs",
                        "{ \"type\": \"cube\", \"color\": 3447003 }",
                        "```",
                        "",
                        "### Knowledge Check",
                        "1. What should happen to Mermaid blocks?",
                        "   a) Stay as raw code",
                        "   b) Render as diagrams",
                        "   c) Delete themselves",
                        "",
                        "Answer Key: 1. b"
                    ].join("\n");

                    streamMarkdown(aiNode, dummyText, 'demo');
                }, 900);

                return;
            }

            try {
                const res = await fetch(apiUrl + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`Request failed: ${res.status}`);

                const data = await res.json();

                stopThinking(aiNode);
                streamMarkdown(aiNode, data.response || data.result || data.text || '', provider);
            } catch (err) {
                stopThinking(aiNode);
                streamMarkdown(aiNode, `Unable to generate a response.\n\n\`${err.message}\``, provider);
            }
        });

        setMode(currentMode);
    </script>

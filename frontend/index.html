<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribe - Learn Anything</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://3dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        chat: {
                            bg: '#212121',
                            sidebar: '#171717',
                            input: '#2f2f2f',
                            border: '#383838',
                            hover: '#2f2f2f',
                            user: '#2f2f2f',
                            text: '#ececec',
                            muted: '#b4b4b4'
                        }
                    }
                }
            }
        };
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #acacbe; }

        body { background-color: #212121; color: #ececec; }

        /* Splash Screen Animations */
        #splash-screen {
            transition: opacity 0.6s ease-out, transform 0.6s ease-out, visibility 0.6s ease-out;
        }
        #splash-screen.splash-hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.02);
            pointer-events: none;
        }
        .splash-content {
            animation: splashPop 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes splashPop {
            0% { transform: scale(0.85); opacity: 0; filter: blur(4px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0px); }
        }

        .prose p { margin-bottom: 1rem; line-height: 1.7; }
        .prose pre { margin: 1rem 0; background-color: #0d0d0d; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #383838; }
        .prose table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9em; }
        .prose th { border-bottom: 2px solid #383838; padding: 0.75rem; text-align: left; font-weight: 600; background: #2a2a2a; }
        .prose td { border-bottom: 1px solid #383838; padding: 0.75rem; text-align: left; }
        .prose tr:hover { background: #2a2a2a; }
        .prose blockquote { border-left: 4px solid #383838; padding-left: 1rem; color: #b4b4b4; font-style: italic; margin: 1rem 0; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin: 1rem 0; }
        .prose h1, .prose h2, .prose h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
        .prose h1 { font-size: 1.5rem; }
        .prose h2 { font-size: 1.25rem; }
        .prose h3 { font-size: 1.1rem; }

        .blinking-cursor::after {
            content: '.';
            animation: blink 1s step-end infinite;
            margin-left: 4px;
            font-size: 0.8em;
            color: #ececec;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        textarea { resize: none; overflow-y: hidden; max-height: 200px; }
        textarea::-webkit-scrollbar { display: none; }

        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        .mermaid-container, .plotly-container, .threejs-container, .quiz-container, .threedmol-container, .pyvista-container, .manim-container {
            margin: 1.5rem 0;
            background: #1a1a1a;
            border: 1px solid #383838;
            border-radius: 0.75rem;
            padding: 1.25rem;
            overflow: hidden;
            width: 100%;
        }
        .mermaid-container { display: flex; justify-content: center; }
        .threejs-container canvas, .threedmol-container canvas { width: 100% !important; height: 400px !important; }
        .plotly-container { min-height: 300px; }
        .pyvista-container iframe { width: 100%; height: 400px; border: none; border-radius: 0.5rem; }
        .manim-container video { width: 100%; max-height: 400px; border-radius: 0.5rem; }

        .quiz-container { border: 2px solid #3b82f644; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .quiz-question-box { background: #262626; border: 1px solid #383838; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1.5rem; transition: transform 0.2s; }
        .quiz-question-box:hover { border-color: #4b5563; }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            border: 1px solid #383838;
            background: #2f2f2f;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        .quiz-option:hover:not(.disabled) { background: #3d3d3d; border-color: #60a5fa; }
        .quiz-option.selected { background: #3b82f622; border-color: #3b82f6; box-shadow: inset 0 0 0 1px #3b82f6; }
        .quiz-option.correct { background: #10b98122 !important; border-color: #10b981 !important; color: #34d399; }
        .quiz-option.incorrect { background: #ef444422 !important; border-color: #ef4444 !important; color: #f87171; }
        .quiz-submit-btn {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            display: block;
            margin: 1.5rem auto 0;
        }
        .quiz-submit-btn:hover { background: #2563eb; transform: translateY(-1px); }
        .quiz-submit-btn:disabled { background: #4b5563; cursor: not-allowed; transform: none; }

        /* Section indicator styles */
        .section-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .section-badge.teach { background: #3b82f622; color: #60a5fa; border: 1px solid #3b82f644; }
        .section-badge.deep { background: #8b5cf622; color: #a78bfa; border: 1px solid #8b5cf644; }
        .section-badge.connectors { background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b44; }
        .section-badge.quiz { background: #10b98122; color: #34d399; border: 1px solid #10b98144; }

        @media (min-width: 768px) {
            .sidebar-desktop-closed { width: 0 !important; border-right-width: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
        }
        @media (max-width: 767px) {
            .sidebar-mobile-open { transform: translateX(0) !important; }
        }
    </style>
</head>

<body class="h-screen flex font-sans overflow-hidden text-sm md:text-base relative">

    <!-- SPLASH SCREEN / OPENING SCENE -->
    <div id="splash-screen" class="fixed inset-0 z-[100] bg-chat-bg flex flex-col items-center justify-center">
        <div class="splash-content flex flex-col items-center gap-5">
            <div class="flex items-center justify-center text-white">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="w-24 h-24 animate-[spin_6s_linear_infinite]">
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(45 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(-45 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(90 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5"></ellipse>
                </svg>
            </div>
            <h1 class="text-3xl font-semibold tracking-tight text-white">Scribe</h1>
        </div>
    </div>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="bg-chat-sidebar border-r border-chat-border flex flex-col shrink-0 transition-all duration-300 ease-in-out z-30 fixed md:relative h-full w-[260px] -translate-x-full md:translate-x-0 overflow-hidden">
        <div class="p-3 flex items-center justify-between">
            <button onclick="newChat()" class="flex-1 flex items-center gap-2 px-3 py-2 text-sm text-chat-text hover:bg-chat-hover rounded-lg transition-colors border border-chat-border group whitespace-nowrap">
                <i data-lucide="plus" class="w-4 h-4 text-chat-muted group-hover:text-chat-text shrink-0"></i>
                New lesson
            </button>
            <button onclick="toggleSidebar()" class="md:hidden ml-2 p-2 text-chat-muted hover:text-chat-text rounded-md hover:bg-chat-hover shrink-0">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-2 space-y-6 custom-scrollbar w-[260px]">
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-chat-muted uppercase tracking-wider px-2">Settings</h3>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Learner Level</label>
                    <select id="setting-level" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500 cursor-pointer">
                        <option value="Beginner">Beginner</option>
                        <option value="Student" selected>Student</option>
                        <option value="College">College</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Researcher">Researcher</option>
                        <option value="Mariana Trench Mode">Mariana Trench</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Provider Model</label>
                    <select id="setting-provider" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500 cursor-pointer">
                        <option value="auto">Auto Route</option>
                        <option value="groq">GPT 4.5</option>
                        <option value="glm">GLM 5.2 </option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-chat-muted px-2">Language</label>
                    <input type="text" id="setting-language" value="English" class="w-full bg-chat-bg border border-chat-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-500">
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-chat-muted uppercase tracking-wider px-2">Session</h3>
                <div class="text-xs text-chat-muted px-2">
                    <div class="flex items-center justify-between mb-1">
                        <span>Session ID:</span>
                        <code id="session-id-display" class="text-[10px] text-blue-400 bg-chat-bg px-1 py-0.5 rounded">-</code>
                    </div>
                    <div class="flex items-center justify-between">
                        <span>Messages:</span>
                        <span id="msg-count-display" class="text-chat-text">0</span>
                    </div>
                </div>
                <button onclick="clearSessionMemory()" class="w-full px-3 py-1.5 text-xs text-red-400 border border-red-500/30 rounded-lg hover:bg-red-500/10 transition-colors">
                    Clear Session Memory
                </button>
            </div>
        </div>

        <div class="p-3 border-t border-chat-border w-[260px]">
            <div class="flex items-center gap-2 px-3 py-2 text-sm rounded-lg hover:bg-chat-hover cursor-pointer transition-colors">
                <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-medium text-xs shrink-0">U</div>
                <span class="font-medium text-chat-text truncate">User</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full bg-chat-bg min-w-0">
        <header class="flex items-center justify-between p-3 border-b border-chat-border text-chat-text bg-chat-bg z-10 shrink-0">
            <div class="flex items-center gap-2">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-chat-hover rounded-md text-chat-muted hover:text-chat-text transition-colors">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2 ml-1">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-500 animate-[spin_6s_linear_infinite]">
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(45 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(-45 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(90 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5"></ellipse>
                    </svg>
                    <span class="font-medium tracking-tight">Scribe</span>
                </div>
            </div>
            <button onclick="newChat()" class="p-2 hover:bg-chat-hover rounded-md text-chat-muted hover:text-chat-text md:hidden">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto scroll-smooth">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center px-4 text-center max-w-2xl mx-auto opacity-100 transition-opacity duration-500 min-h-[60vh]">
                <div class="mb-6 flex items-center justify-center text-blue-500">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="w-20 h-20 animate-[spin_6s_linear_infinite]">
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(45 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(-45 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(90 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="10" ry="3.5"></ellipse>
                    </svg>
                </div>
                <h1 class="text-2xl font-semibold mb-8">How can I help you learn today?</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full">
                    <button onclick="prefill('Teach me about Quantum Entanglement', 'teach')" class="p-4 border border-chat-border rounded-xl text-left hover:bg-chat-hover transition-colors">
                        <div class="font-medium text-sm text-chat-text">Quantum Entanglement</div>
                        <div class="text-xs text-chat-muted mt-1">Explain the core concepts simply</div>
                    </button>
                    <button onclick="prefill('Derive the Navier-Stokes equations', 'deep')" class="p-4 border border-chat-border rounded-xl text-left hover:bg-chat-hover transition-colors">
                        <div class="font-medium text-sm text-chat-text">Navier-Stokes</div>
                        <div class="text-xs text-chat-muted mt-1">Deep dive with Mariana Mode</div>
                    </button>
                </div>
            </div>
            <div id="chat-transcript" class="pb-6 pt-6 flex flex-col gap-6 w-full"></div>
        </div>

        <div class="w-full bg-chat-bg pt-2 pb-6 px-4 md:px-8 shrink-0 z-10 border-t border-chat-border md:border-transparent">
            <div class="max-w-3xl mx-auto relative">
                <!-- Section mode buttons above input -->
                <div class="flex items-center gap-2 mb-3 overflow-x-auto pb-1 hide-scrollbar">
                    <button onclick="setMode('teach')" id="mode-teach" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-chat-input text-chat-text border border-chat-border hover:bg-gray-700 transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="graduation-cap" class="w-3.5 h-3.5"></i> Teach
                    </button>
                    <button onclick="setMode('deep')" id="mode-deep" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="waves" class="w-3.5 h-3.5"></i> Mariana Dive
                    </button>
                    <button onclick="setMode('connectors')" id="mode-connectors" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Analyze Source
                    </button>
                    <button onclick="setMode('quiz')" id="mode-quiz" class="mode-btn px-3 py-1.5 rounded-full text-xs font-medium bg-transparent text-chat-muted border border-transparent hover:bg-chat-hover transition-colors flex items-center gap-1.5 whitespace-nowrap">
                        <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> Quiz Me
                    </button>
                </div>

                <div id="context-options" class="hidden flex flex-wrap items-center gap-3 mb-3 px-1 transition-all">
                    <div id="opt-task" class="hidden flex items-center gap-2 text-xs text-chat-muted">
                        <label>Task:</label>
                        <select id="input-task" class="bg-chat-input border border-chat-border rounded px-2 py-1 focus:outline-none text-chat-text">
                            <option value="summary">Summary</option>
                            <option value="deep_explanation" selected>Deep Explanation</option>
                            <option value="formula_extraction">Extract Formulas</option>
                            <option value="quiz">Generate Quiz</option>
                        </select>
                    </div>
                    <div id="opt-num" class="hidden flex items-center gap-2 text-xs text-chat-muted">
                        <label>Questions:</label>
                        <input type="number" id="input-num" min="1" max="20" value="5" class="bg-chat-input border border-chat-border rounded px-2 py-1 w-16 focus:outline-none text-chat-text">
                    </div>
                    <div id="opt-quiz-context" class="hidden flex items-center gap-2 text-xs">
                        <label class="text-chat-muted">Quiz from conversation?</label>
                        <input type="checkbox" id="input-quiz-context" class="accent-blue-500">
                    </div>
                </div>

                <form id="chat-form" class="relative flex items-end bg-chat-input rounded-2xl border border-chat-border shadow-lg focus-within:border-gray-500 transition-colors p-1">
                    <textarea id="main-input" rows="1" placeholder="Enter a topic to learn..." class="w-full bg-transparent text-chat-text text-base px-4 py-3 focus:outline-none placeholder-chat-muted resize-none custom-scrollbar m-0" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    <button type="submit" id="submit-btn" class="mb-2 mr-2 p-2 bg-white text-black rounded-xl hover:bg-gray-200 disabled:bg-chat-border disabled:text-chat-muted transition-colors flex-shrink-0">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <template id="tpl-user-msg">
        <div class="w-full max-w-3xl mx-auto px-4 flex justify-end mb-4">
            <div class="bg-[#2f2f2f] text-chat-text rounded-2xl rounded-tr-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap text-sm md:text-base border border-[#383838]"></div>
        </div>
    </template>

    <template id="tpl-ai-msg">
        <div class="w-full max-w-3xl mx-auto px-4 flex gap-4 mb-4">
            <div class="w-8 h-8 flex items-center justify-center shrink-0 text-blue-500 mt-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 ai-logo-svg transition-transform duration-300">
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(45 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(-45 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5" transform="rotate(90 12 12)"></ellipse>
                    <ellipse cx="12" cy="12" rx="10" ry="3.5"></ellipse>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <details class="group mb-3 border border-chat-border rounded-lg bg-[#1a1a1a] text-xs overflow-hidden hidden" id="thought-accordion">
                    <summary class="px-3 py-2 cursor-pointer flex items-center gap-2 text-chat-muted hover:text-chat-text transition-colors">
                        <i data-lucide="chevron-right" class="w-3 h-3 group-open:rotate-90 transition-transform"></i>
                        <span class="font-mono" id="thought-status">Thinking...</span>
                        <i data-lucide="loader-circle" class="w-3 h-3 animate-spin ml-auto" id="thought-spinner"></i>
                    </summary>
                    <div class="px-3 pb-3 font-mono text-chat-muted whitespace-pre-wrap break-words max-h-48 overflow-y-auto custom-scrollbar" id="thought-logs"></div>
                </details>
                <div class="prose prose-invert max-w-none text-chat-text prose-sm md:prose-base content-area"></div>
                <div class="flex items-center gap-3 mt-4 mb-2 opacity-0 transition-opacity action-bar hidden">
                    <button class="text-chat-muted hover:text-chat-text transition-colors p-1" title="Copy" onclick="copyText(this)">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <span class="text-[10px] uppercase font-mono px-2 py-0.5 rounded bg-chat-input text-chat-muted border border-chat-border provider-badge"></span>
                </div>
            </div>
        </div>
    </template>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();

            // Generate a session ID for conversational memory
            sessionStorage.setItem('scribe_session_id', generateSessionId());
            updateSessionDisplay();

            // Splash Screen Logic
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('splash-hidden');
                }
            }, 1800);
        });

       mermaid.initialize({
       startOnLoad: false,
       theme: 'dark',
       securityLevel: 'loose',
       suppressErrorRendering: true,
       flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
       });

        if (window.markedGfmHeadingId) {
            marked.use(window.markedGfmHeadingId.gfmHeadingId());
        }

        marked.setOptions({
            gfm: true,
            breaks: true,
            mangle: false,
            headerIds: false
        });

        let currentMode = 'teach';
        let isGenerating = false;

       function processTextWithMath(text) {
    const mathBlocks = [];
    let counter = 0;

    text = text.replace(/\$\$([\s\S]+?)\$\$/g, (match, p1) => {
        const id = `MATHBLOCKPLACEHOLDER${counter}ENDPLACEHOLDER`;
        mathBlocks.push({ id, math: p1, display: true });
        counter++;
        return id;
    });

    text = text.replace(/\\\[([\s\S]+?)\\\]/g, (match, p1) => {
        const id = `MATHBLOCKPLACEHOLDER${counter}ENDPLACEHOLDER`;
        mathBlocks.push({ id, math: p1, display: true });
        counter++;
        return id;
    });

    text = text.replace(/(?<!\$)\$([^\s$](?:[^$]*?[^\s$])?)\$(?!\$)/g, (match, p1) => {
        const id = `MATHBLOCKPLACEHOLDER${counter}ENDPLACEHOLDER`;
        mathBlocks.push({ id, math: p1, display: false });
        counter++;
        return id;
    });

    text = text.replace(/\\\(([\s\S]+?)\\\)/g, (match, p1) => {
        const id = `MATHBLOCKPLACEHOLDER${counter}ENDPLACEHOLDER`;
        mathBlocks.push({ id, math: p1, display: false });
        counter++;
        return id;
    });

    let html = marked.parse(text);

    mathBlocks.forEach(block => {
        try {
            const mathHtml = katex.renderToString(block.math, {
                displayMode: block.display,
                throwOnError: false
            });
            html = html.split(block.id).join(mathHtml);
        } catch (e) {
            html = html.split(block.id).join(`<span class="text-red-500 font-mono">${block.math}</span>`);
        }
    });

    return html;
   }

        // ─── RENDER VISUALS: plotly, Three.js, 3Dmol.js, PyVista, Manim ───
        function renderVisuals(container) {
            const blocks = container.querySelectorAll('pre code');

            blocks.forEach((block) => {
                const lang = block.className || '';
                const content = block.textContent.trim();
                const pre = block.parentElement;

                const isMermaidLang = lang.includes('language-mermaid') || lang.includes('mermaid');
                const hasMermaidKeyword = /^(graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie|gitGraph|journey|C4Context|mindmap|timeline|quadrantChart|xychart-beta)\b/i.test(content);

                // ─── Mermaid ───
                if (isMermaidLang || hasMermaidKeyword) {
                    const id = `mermaid_${Date.now()}_${Math.floor(Math.random() * 1000)}`;
                    const div = document.createElement('div');
                    div.className = 'mermaid-container';
                    div.id = id;
                    pre.replaceWith(div);

                    setTimeout(async () => {
                        try {
                            let cleanContent = content.replace(/^```mermaid\s*/i, '').replace(/```$/i, '').trim();

                            cleanContent = cleanContent.replace(/\[([^\]]*)\]/g, (match, label) => {
                                if (label.startsWith('"') && label.endsWith('"')) return match;
                                const safeLabel = label.replace(/\(/g, '（').replace(/\)/g, '）');
                                return `["${safeLabel.replace(/"/g, "'")}"]`;
                            });

                            const { svg } = await mermaid.render(`${id}_svg`, cleanContent);
                            div.innerHTML = svg;
                        } catch (err) {
                            console.error("Mermaid Render Error:", err);
                            div.innerHTML = `<div class="text-xs text-red-500 p-2 bg-red-900/20 rounded font-mono overflow-auto max-h-32">Mermaid Syntax Error:<br>${err.message}</div>`;
                        }
                    }, 100);

                // ─── Plotly (MUST RENDER) ───
                } else if (lang.includes('plotly') || (content.includes('"data"') && content.includes('"layout"'))) {
                    try {
                        const data = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'plotly-container';
                        pre.replaceWith(div);
                        Plotly.newPlot(div, data.data || [], data.layout || { template: 'plotly_dark' }, { responsive: true });
                    } catch (e) {
                        if (lang.includes('plotly')) pre.innerHTML = `<div class="text-xs text-red-500 font-mono">Plotly Data Error</div>`;
                    }

                // ─── Three.js ───
                } else if (lang.includes('threejs') || (content.includes('"type"') && content.includes('"color"') && content.includes('"objects"'))) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'threejs-container';
                        pre.replaceWith(div);
                        initThreeJS(div, spec);
                    } catch (e) {
                        pre.innerHTML = `<div class="text-xs text-red-500 font-mono">3D Spec Error: ${e.message}</div>`;
                    }

                // ─── 3Dmol.js (for molecular structures) ───
                } else if (lang.includes('3dmol') || lang.includes('3dmol-js') || (content.includes('"type"') && content.includes('"pdb")')) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'threedmol-container';
                        pre.replaceWith(div);
                        initThreeDmol(div, spec);
                    } catch (e) {
                        pre.innerHTML = `<div class="text-xs text-red-500 font-mono">3Dmol.js Error: ${e.message}</div>`;
                    }

                // ─── PyVista / VTK ───
                } else if (lang.includes('pyvista') || lang.includes('vtk')) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'pyvista-container';
                        pre.replaceWith(div);
                        initPyVista(div, spec);
                    } catch (e) {
                        pre.innerHTML = `<div class="text-xs text-red-500 font-mono">PyVista Error: ${e.message}</div>`;
                    }

                // ─── Manim Animation ───
                } else if (lang.includes('manim')) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'manim-container';
                        pre.replaceWith(div);
                        initManim(div, spec);
                    } catch (e) {
                        pre.innerHTML = `<div class="text-xs text-red-500 font-mono">Manim Error: ${e.message}</div>`;
                    }

                // ─── SVG Spec ───
                } else if (lang.includes('svg-spec') || (content.trim().startsWith('{') && content.includes('"elements"'))) {
                    try {
                        const spec = JSON.parse(content);
                        const div = document.createElement('div');
                        div.className = 'threejs-container';
                        pre.replaceWith(div);
                        renderSvgSpec(div, spec);
                    } catch (e) {
                        pre.innerHTML = `<div class="text-xs text-red-500 font-mono">SVG Spec Error: ${e.message}</div>`;
                    }
                }
            });

            renderInteractiveQuiz(container);
        }

        // ─── Interactive Quiz Rendering ───
        function renderInteractiveQuiz(container) {
            const rawText = container.getAttribute('data-raw') || "";
            const quizStart = rawText.search(/(?:#+\s*|\*\*?)(?:Quiz|Practice Problems|Test Your Knowledge|Knowledge Check|Pop Quiz)(?:\*\*?)?/i);

            if (quizStart === -1) {
                if (!rawText.match(/(?:^|\n)\s*1[\.\)]\s+.+\n\s*(?:[a-d][\)\.]|\([a-d]\))/i)) return;
            }

            const quizContent = quizStart !== -1 ? rawText.substring(quizStart) : rawText;
            const questions = [];
            const qBlocks = quizContent.split(/(?:^|\n)\s*\d+[\.\)]\s+/).filter(b => b.trim().length > 5);

            qBlocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 2) return;

                const questionText = lines[0];
                const options = lines.filter(l => /^\s*(?:[a-d][\)\.]|\([a-d]\))/i.test(l));

                if (questionText && options.length >= 2) {
                    questions.push({
                        question: questionText,
                        options: options.map(o => o.replace(/^\s*(?:[a-d][\)\.]|\([a-d]\))\s*/i, '').trim()),
                        correct: 0,
                        selectedIndex: null
                    });
                }
            });

            if (questions.length === 0) return;

            const answerKeyMatch = rawText.match(/(?:Answer Key|Answers|Correct Answers|Solutions):?([\s\S]*)/i);
            if (answerKeyMatch) {
                const keySection = answerKeyMatch[1];
                const mappedKeys = [...keySection.matchAll(/\b(\d+)[\.\-\):]\s*([a-d])\b/gi)];

                if (mappedKeys.length > 0) {
                    mappedKeys.forEach(match => {
                        const targetIdx = parseInt(match[1]) - 1;
                        const ansLetter = match[2].toLowerCase();
                        if (questions[targetIdx]) questions[targetIdx].correct = ansLetter.charCodeAt(0) - 97;
                    });
                }
            }

            const quizContainer = document.createElement('div');
            quizContainer.className = 'quiz-container mt-6';
            quizContainer.innerHTML = `<h3 class="text-base font-semibold mb-4 flex items-center gap-2 text-blue-400"><i data-lucide="help-circle" class="w-5 h-5"></i> Interactive Knowledge Check</h3>`;

            questions.forEach((q, qIdx) => {
                const qBox = document.createElement('div');
                qBox.className = 'quiz-question-box';
                qBox.innerHTML = `<p class="font-medium text-chat-text mb-3">${qIdx + 1}. ${q.question}</p>`;

                const optsDiv = document.createElement('div');
                optsDiv.className = 'space-y-2';

                q.options.forEach((opt, oIdx) => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-option';
                    btn.innerHTML = `<span class="w-6 h-6 rounded-full border border-chat-border flex items-center justify-center text-xs font-mono shrink-0 bg-chat-bg">${String.fromCharCode(65 + oIdx)}</span> <span class="flex-1">${opt}</span>`;
                    
                    btn.onclick = () => {
                        if (q.selectedIndex !== null) return;
                        q.selectedIndex = oIdx;
                        
                        Array.from(optsDiv.children).forEach((child, idx) => {
                            child.classList.add('disabled');
                            if (idx === q.correct) child.classList.add('correct');
                            if (idx === oIdx && oIdx !== q.correct) child.classList.add('incorrect');
                        });
                    };
                    optsDiv.appendChild(btn);
                });

                qBox.appendChild(optsDiv);
                quizContainer.appendChild(qBox);
            });

            container.querySelector('.content-area').appendChild(quizContainer);
            lucide.createIcons();
        }

        // ─── Three.js Renderer ───
        function initThreeJS(div, spec) {
        div.innerHTML = '';
        const width = div.clientWidth || 600;
        const height = 400;

        const scene = new THREE.Scene();
        scene.background = null;

        const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
        camera.position.set(0, 0, spec.cameraDistance || 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        div.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const objects = [];
        const shapes = spec.objects || spec.elements || [spec];

        shapes.forEach(obj => {
        let geometry;
        const type = (obj.type || 'sphere').toLowerCase();
        const size = obj.size || 1;

        if (type.includes('box') || type.includes('cube')) {
            geometry = new THREE.BoxGeometry(size, size, size);
        } else if (type.includes('sphere')) {
            geometry = new THREE.SphereGeometry(size * 0.6, 32, 32);
        } else if (type.includes('cylinder')) {
            geometry = new THREE.CylinderGeometry(size * 0.5, size * 0.5, size, 32);
        } else if (type.includes('cone')) {
            geometry = new THREE.ConeGeometry(size * 0.5, size, 32);
        } else if (type.includes('torus')) {
            geometry = new THREE.TorusGeometry(size * 0.5, size * 0.2, 16, 100);
        } else if (type.includes('plane')) {
            geometry = new THREE.PlaneGeometry(size, size);
        } else {
            geometry = new THREE.SphereGeometry(size * 0.6, 32, 32);
        }

        const color = obj.color ? new THREE.Color(obj.color) : new THREE.Color(0x60a5fa);
        const material = new THREE.MeshStandardMaterial({
            color,
            metalness: 0.2,
            roughness: 0.5,
            wireframe: !!obj.wireframe
        });

        const mesh = new THREE.Mesh(geometry, material);
        if (obj.position) {
            mesh.position.set(obj.position.x || 0, obj.position.y || 0, obj.position.z || 0);
        } else if (obj.x !== undefined) {
            mesh.position.set((obj.x - 300) / 60, -(obj.y - 200) / 60, 0);
        }
        scene.add(mesh);
        objects.push(mesh);
        });

        if (objects.length === 0) {
        const geo = new THREE.SphereGeometry(1.2, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.4 });
        const mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);
        objects.push(mesh);
        }

        let frameId;
        function animate() {
        frameId = requestAnimationFrame(animate);
        objects.forEach(o => { o.rotation.y += 0.006; o.rotation.x += 0.002; });
        renderer.render(scene, camera);
        }
        animate();

        const observer = new MutationObserver(() => {
        if (!document.body.contains(div)) {
            cancelAnimationFrame(frameId);
            renderer.dispose();
            observer.disconnect();
        }
         });
        observer.observe(document.body, { childList: true, subtree: true });
          }

        // ─── 3Dmol.js Renderer ───
        function initThreeDmol(div, spec) {
            div.innerHTML = '';
            div.style.position = 'relative';
            div.style.height = '400px';

            try {
                const viewer = $3Dmol.createViewer(div, {
                    backgroundColor: 'black',
                    width: div.clientWidth,
                    height: 400
                });

                if (spec.molecule_type === 'pdb') {
                    viewer.addModel(spec.data, "pdb");
                } else if (spec.molecule_type === 'sdf') {
                    viewer.addModel(spec.data, "sdf");
                } else if (spec.molecule_type === 'cif') {
                    viewer.addModel(spec.data, "cif");
                } else if (spec.smiles) {
                    viewer.addModel(spec.smiles, "smi");
                } else {
                    // Fallback: show a placeholder
                    div.innerHTML = `<div class="text-sm text-chat-muted">No molecular data provided</div>`;
                    return;
                }

                const style = spec.style || { stick: { colorscheme: 'greenCarbon' } };
                viewer.setStyle({}, style);

                if (spec.zoom) {
                    viewer.zoomTo();
                }
                viewer.render();
                viewer.zoom(0.8, 1000);

                // Label
                if (spec.label) {
                    const label = document.createElement('div');
                    label.className = 'absolute bottom-2 left-2 text-xs text-chat-muted bg-black/50 px-2 py-1 rounded';
                    label.textContent = spec.label;
                    div.appendChild(label);
                }
            } catch (e) {
                div.innerHTML = `<div class="text-xs text-red-500 font-mono">3Dmol.js Error: ${e.message}</div>`;
            }
        }

        // ─── PyVista / VTK Renderer (iframe fallback) ───
        function initPyVista(div, spec) {
            div.innerHTML = '';
            div.className = 'pyvista-container';

            try {
                // Create an embedded 3D viewer using Three.js as PyVista visualization fallback
                // PyVista outputs are typically HTML/VTK JSON that we render via a canvas
                const width = div.clientWidth || 600;
                const height = 400;

                const scene = new THREE.Scene();
                scene.background = null;

                const camera = new THREE.PerspectiveCamera(45, width / height, 0.01, 1000);
                camera.position.set(0, 0, 5);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(window.devicePixelRatio || 1);
                div.appendChild(renderer.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambient);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight.position.set(5, 5, 5);
                scene.add(dirLight);

                const objects = [];

                // Parse PyVista spec - handle common PyVista output formats
                const shapes = spec.objects || spec.meshes || spec.elements || [spec];
                shapes.forEach(obj => {
                    let geometry;
                    const type = (obj.type || 'sphere').toLowerCase();
                    const size = obj.size || 1;

                    if (type.includes('box') || type.includes('cube')) {
                        geometry = new THREE.BoxGeometry(size, size, size);
                    } else if (type.includes('sphere') || type.includes('blob')) {
                        geometry = new THREE.SphereGeometry(size * 0.6, 32, 32);
                    } else if (type.includes('cylinder') || type.includes('tube')) {
                        geometry = new THREE.CylinderGeometry(size * 0.5, size * 0.5, size, 32);
                    } else if (type.includes('cone')) {
                        geometry = new THREE.ConeGeometry(size * 0.5, size, 32);
                    } else if (type.includes('plane') || type.includes('surface')) {
                        geometry = new THREE.PlaneGeometry(size, size, 32, 32);
                    } else if (type.includes('point') || type.includes('node')) {
                        geometry = new THREE.SphereGeometry(size * 0.3, 16, 16);
                    } else {
                        geometry = new THREE.SphereGeometry(size * 0.6, 32, 32);
                    }

                    const color = obj.color ? new THREE.Color(obj.color) : new THREE.Color(0x60a5fa);
                    const material = new THREE.MeshStandardMaterial({
                        color,
                        metalness: 0.3,
                        roughness: 0.4,
                        wireframe: !!obj.wireframe
                    });

                    const mesh = new THREE.Mesh(geometry, material);
                    if (obj.position) {
                        mesh.position.set(obj.position.x || 0, obj.position.y || 0, obj.position.z || 0);
                    } else if (obj.x !== undefined) {
                        mesh.position.set((obj.x - 300) / 60, -(obj.y - 200) / 60, 0);
                    }
                    if (obj.rotation) {
                        mesh.rotation.set(obj.rotation.x || 0, obj.rotation.y || 0, obj.rotation.z || 0);
                    }
                    scene.add(mesh);
                    objects.push(mesh);
                });

                // Add grid for scientific context
                const gridHelper = new THREE.GridHelper(10, 10, 0x383838, 0x2a2a2a);
                scene.add(gridHelper);

                // Axes
                const axesHelper = new THREE.AxesHelper(2);
                scene.add(axesHelper);

                let frameId;
                function animate() {
                    frameId = requestAnimationFrame(animate);
                    objects.forEach(o => { o.rotation.y += 0.005; o.rotation.x += 0.002; });
                    renderer.render(scene, camera);
                }
                animate();

                const observer = new MutationObserver(() => {
                    if (!document.body.contains(div)) {
                        cancelAnimationFrame(frameId);
                        renderer.dispose();
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { childList: true, subtree: true });

            } catch (e) {
                div.innerHTML = `<div class="text-xs text-red-500 font-mono">PyVista Render Error: ${e.message}</div>`;
            }
        }

        // ─── Manim Animation Renderer ───
        function initManim(div, spec) {
            div.innerHTML = '';
            div.className = 'manim-container';

            try {
                // Manim outputs are typically video files or animated scene descriptions
                // We render them as described in the spec
                if (spec.video_url) {
                    // Direct video playback
                    const video = document.createElement('video');
                    video.src = spec.video_url;
                    video.controls = true;
                    video.autoplay = !!spec.autoplay;
                    video.loop = !!spec.loop;
                    video.style.width = '100%';
                    video.style.maxHeight = '400px';
                    video.style.borderRadius = '0.5rem';
                    div.appendChild(video);
                } else if (spec.script || spec.scene_description) {
                    // Render Manim scene description as animated SVG/Canvas
                    const desc = spec.script || spec.scene_description;
                    const canvas = document.createElement('canvas');
                    canvas.width = div.clientWidth || 600;
                    canvas.height = 400;
                    canvas.style.borderRadius = '0.5rem';
                    canvas.style.background = '#0a0a0a';
                    div.appendChild(canvas);

                    const ctx = canvas.getContext('2d');
                    const W = canvas.width, H = canvas.height;

                    // Parse simple Manim scene instructions and animate
                    let progress = 0;
                    function animateManim() {
                        progress += 0.005;
                        if (progress > 1) progress = 1;

                        ctx.fillStyle = '#0a0a0a';
                        ctx.fillRect(0, 0, W, H);

                        // Render based on scene type
                        if (desc.includes('circle') || desc.includes('Circle')) {
                            const radius = Math.min(W, H) * 0.25 * progress;
                            ctx.strokeStyle = '#60a5fa';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(W/2, H/2, radius, 0, Math.PI * 2);
                            ctx.stroke();
                        } else if (desc.includes('square') || desc.includes('Square')) {
                            const size = Math.min(W, H) * 0.4 * progress;
                            ctx.strokeStyle = '#60a5fa';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(W/2 - size/2, H/2 - size/2, size, size);
                        } else if (desc.includes('transform') || desc.includes('Transform')) {
                            const t = progress;
                            const r1 = Math.min(W, H) * 0.15;
                            const r2 = Math.min(W, H) * 0.25;
                            ctx.strokeStyle = `rgba(96, 165, 250, ${t})`;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(W/2, H/2, r1 + (r2 - r1) * t, 0, Math.PI * 2);
                            ctx.stroke();
                        } else {
                            // Generic animation: draw text with fade
                            ctx.fillStyle = `rgba(236, 236, 236, ${progress})`;
                            ctx.font = '16px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText('Manim Animation', W/2, H/2);
                            if (desc) {
                                ctx.font = '12px monospace';
                                ctx.fillStyle = `rgba(180, 180, 180, ${progress * 0.7})`;
                                ctx.fillText(desc.substring(0, 80), W/2, H/2 + 25);
                            }
                        }

                        if (progress < 1) {
                            requestAnimationFrame(animateManim);
                        }
                    }
                    animateManim();
                } else if (spec.elements || spec.shapes) {
                    // Render Manim shapes as animated canvas elements
                    const shapes = spec.elements || spec.shapes || [spec];
                    const canvas = document.createElement('canvas');
                    canvas.width = div.clientWidth || 600;
                    canvas.height = 400;
                    canvas.style.borderRadius = '0.5rem';
                    canvas.style.background = '#0a0a0a';
                    div.appendChild(canvas);

                    const ctx = canvas.getContext('2d');
                    const W = canvas.width, H = canvas.height;
                    let progress = 0;

                    function animateShapes() {
                        progress += 0.005;
                        if (progress > 1) progress = 1;

                        ctx.fillStyle = '#0a0a0a';
                        ctx.fillRect(0, 0, W, H);

                        shapes.forEach((shape, i) => {
                            const delay = i * 0.15;
                            const p = Math.max(0, Math.min(1, (progress - delay) / (1 - delay * shapes.length)));
                            if (p <= 0) return;

                            const type = (shape.type || 'circle').toLowerCase();
                            const color = shape.color || '#60a5fa';
                            const size = shape.size || 1;

                            ctx.strokeStyle = color;
                            ctx.lineWidth = 2;
                            ctx.globalAlpha = p;

                            const cx = (shape.x || 0) + W/2;
                            const cy = (shape.y || 0) + H/2;

                            if (type === 'circle') {
                                ctx.beginPath();
                                ctx.arc(cx, cy, size * 40, 0, Math.PI * 2);
                                ctx.stroke();
                            } else if (type === 'square' || type === 'rectangle') {
                                ctx.strokeRect(cx - size * 30, cy - size * 30, size * 60, size * 60);
                            } else if (type === 'line') {
                                ctx.beginPath();
                                ctx.moveTo(cx - size * 40, cy);
                                ctx.lineTo(cx + size * 40, cy);
                                ctx.stroke();
                            } else if (type === 'arrow') {
                                ctx.beginPath();
                                ctx.moveTo(cx - size * 30, cy);
                                ctx.lineTo(cx + size * 30, cy);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.moveTo(cx + size * 30, cy);
                                ctx.lineTo(cx + size * 20, cy - 8);
                                ctx.moveTo(cx + size * 30, cy);
                                ctx.lineTo(cx + size * 20, cy + 8);
                                ctx.stroke();
                            }

                            if (shape.label) {
                                ctx.fillStyle = color;
                                ctx.font = '12px monospace';
                                ctx.textAlign = 'center';
                                ctx.fillText(shape.label, cx, cy + size * 50);
                            }

                            ctx.globalAlpha = 1;
                        });

                        if (progress < 1) {
                            requestAnimationFrame(animateShapes);
                        }
                    }
                    animateShapes();
                }
            } catch (e) {
                div.innerHTML = `<div class="text-xs text-red-500 font-mono">Manim Error: ${e.message}</div>`;
            }
        }

        // ─── SVG Spec Renderer ───
        function renderSvgSpec(div, spec) {
         const w = spec.width || 600;
         const h = spec.height || 400;
         const ns = 'http://www.w3.org/2000/svg';
         const svg = document.createElementNS(ns, 'svg');
         svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
         svg.setAttribute('width', '100%');
         svg.style.maxHeight = '420px';

        (spec.elements || []).forEach(el => {
        let node;
        const type = (el.type || '').toLowerCase();

        if (type === 'ellipse') {
            node = document.createElementNS(ns, 'ellipse');
            node.setAttribute('cx', el.cx); node.setAttribute('cy', el.cy);
            node.setAttribute('rx', el.rx); node.setAttribute('ry', el.ry);
        } else if (type === 'circle') {
            node = document.createElementNS(ns, 'circle');
            node.setAttribute('cx', el.cx); node.setAttribute('cy', el.cy);
            node.setAttribute('r', el.r);
        } else if (type === 'rect') {
            node = document.createElementNS(ns, 'rect');
            node.setAttribute('x', el.x); node.setAttribute('y', el.y);
            node.setAttribute('width', el.width); node.setAttribute('height', el.height);
            node.setAttribute('rx', el.rx || 0);
        } else if (type === 'path') {
            node = document.createElementNS(ns, 'path');
            node.setAttribute('d', el.d);
        } else if (type === 'line') {
            node = document.createElementNS(ns, 'line');
            node.setAttribute('x1', el.x1); node.setAttribute('y1', el.y1);
            node.setAttribute('x2', el.x2); node.setAttribute('y2', el.y2);
        } else if (type === 'text') {
            node = document.createElementNS(ns, 'text');
            node.setAttribute('x', el.x); node.setAttribute('y', el.y);
            node.setAttribute('font-size', el.fontSize || 14);
            node.setAttribute('fill', el.fill || '#ececec');
            node.textContent = el.content || el.label || '';
            svg.appendChild(node);
            return;
        } else {
            return;
        }

        if (el.stroke) node.setAttribute('stroke', el.stroke);
        if (el.fill) node.setAttribute('fill', el.fill); else if (type !== 'path') node.setAttribute('fill', 'none');
        if (el.strokeWidth) node.setAttribute('stroke-width', el.strokeWidth);
        if (type === 'path' && !el.fill) node.setAttribute('fill', 'none');
        svg.appendChild(node);

        if (el.label && type !== 'text') {
            const label = document.createElementNS(ns, 'text');
            const lx = el.cx !== undefined ? el.cx : (el.x !== undefined ? el.x + (el.width || 0) / 2 : w / 2);
            const ly = el.cy !== undefined ? el.cy - (el.ry || el.r || 0) - 8 : (el.y !== undefined ? el.y - 8 : h / 2);
            label.setAttribute('x', lx);
            label.setAttribute('y', ly);
            label.setAttribute('font-size', 12);
            label.setAttribute('fill', el.fill && el.fill !== 'none' ? el.fill : '#ececec');
            label.setAttribute('text-anchor', 'middle');
            label.textContent = el.label;
            svg.appendChild(label);
                }
                });

         div.innerHTML = '';
         div.appendChild(svg);
            }   

        function copyText(btn) {
            const contentArea = btn.closest('.flex-1').querySelector('.content-area');
            const textToCopy = contentArea.innerText;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); } catch (err) { console.error('Unable to copy', err); }
                document.body.removeChild(textArea);
            }
            
            btn.innerHTML = `<i data-lucide="check" class="w-4 h-4 text-green-500"></i>`;
            lucide.createIcons();
            
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="copy" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }, 2000);
        }

        // ==========================================
        // ACTUAL BACKEND INTEGRATION WITH CONVERSATIONAL MEMORY
        // ==========================================
        ui.form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = ui.input.value.trim();
            if (!text || isGenerating) return;

            isGenerating = true;
            ui.submitBtn.disabled = true;
            ui.input.disabled = true;

            appendUserMessage(text);
            ui.input.value = '';
            autoResize(ui.input);

            // Mark chat as started after first message
            chatStarted = true;

            const aiNode = createAIMessage();
            const contentArea = aiNode.querySelector('.content-area');
            const actionBar = aiNode.querySelector('.action-bar');
            const badge = aiNode.querySelector('.provider-badge');
            
            badge.textContent = document.getElementById('setting-provider').value.toUpperCase();

            startThinking(aiNode);

            try {
                const level = document.getElementById('setting-level').value;
                const provider = document.getElementById('setting-provider').value;
                const language = document.getElementById('setting-language').value;
                const sessionId = getSessionId();

                let endpointPath = '/teach';
                let requestBody = {};

                if (currentMode === 'teach') {
                    endpointPath = '/teach';
                    // Determine if this is a new session or continuation
                    const isNewSession = !chatStarted || conversationHistory.length === 0;
                    requestBody = {
                        topic: text,
                        question: text,
                        level,
                        provider,
                        language,
                        history: getConversationHistory(),
                        session_id: sessionId,
                        new_session: isNewSession
                    };
                } else if (currentMode === 'deep') {
                    endpointPath = '/learn-deep';
                    const isNewSession = !chatStarted || conversationHistory.length === 0;
                    requestBody = {
                        topic: text,
                        question: text,
                        level,
                        provider,
                        language,
                        history: getConversationHistory(),
                        session_id: sessionId,
                        new_session: isNewSession
                    };
                } else if (currentMode === 'connectors') {
                    endpointPath = '/connectors';
                    requestBody = {
                        source_text: text,
                        task: document.getElementById('input-task').value,
                        level,
                        provider,
                        language
                    };
                    // Add source to conversation history
                    addToConversationHistory('user', `[Source Analysis] ${text}`);
                } else if (currentMode === 'quiz') {
                    endpointPath = '/quiz';
                    const useContext = document.getElementById('input-quiz-context').checked;
                    requestBody = {
                        topic: text,
                        level,
                        provider,
                        language,
                        num_questions: parseInt(document.getElementById('input-num').value, 10) || 10,
                        session_id: sessionId,
                        use_context: useContext
                    };
                    // Add quiz request to conversation history
                    addToConversationHistory('user', `[Quiz Request] ${text}`);
                }

                // Ensure a target URL is provided
                const targetUrl = (apiUrl || 'http://localhost:3000') + endpointPath;

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                stopThinking(aiNode);
                actionBar.classList.remove('hidden');
                actionBar.classList.add('flex');
                setTimeout(() => actionBar.classList.remove('opacity-0'), 50);

                const contentType = response.headers.get('content-type');
                let fullResponse = '';
                let reasoningResponse = '';
                let displayMain = '';

                // Handle Server-Sent Events (SSE) streaming
                if (contentType && contentType.includes('text/event-stream')) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ') && !line.includes('[DONE]')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    
                                    const rToken = data.choices?.[0]?.delta?.reasoning_content || '';
                                    if (rToken) reasoningResponse += rToken;

                                    const textToken = data.choices?.[0]?.delta?.content || data.text || data.message || '';
                                    fullResponse += textToken;
                                } catch (e) {
                                    fullResponse += line.slice(6).replace(/^"|"$/g, '');
                                }
                            } else if (line.trim() && !line.startsWith('data:') && !line.startsWith(':')) {
                                fullResponse += line;
                            }
                        }
                        
                        displayMain = fullResponse;
                        let displayThoughts = reasoningResponse;

                        if (!reasoningResponse && fullResponse.includes('<think>')) {
                            const thinkStart = fullResponse.indexOf('<think>');
                            const thinkEnd = fullResponse.indexOf('</think>');
                            
                            if (thinkEnd !== -1) {
                                displayThoughts = fullResponse.substring(thinkStart + 7, thinkEnd);
                                displayMain = fullResponse.substring(0, thinkStart) + fullResponse.substring(thinkEnd + 8);
                            } else {
                                displayThoughts = fullResponse.substring(thinkStart + 7);
                                displayMain = fullResponse.substring(0, thinkStart);
                            }
                        }

                        const logs = aiNode.querySelector('#thought-logs');
                        const accordion = aiNode.querySelector('#thought-accordion');
                        if (displayThoughts.trim()) {
                            accordion.classList.remove('hidden');
                            logs.textContent = displayThoughts.trimStart();
                            logs.scrollTop = logs.scrollHeight;
                        }

                        aiNode.setAttribute('data-raw', displayMain);
                        contentArea.innerHTML = processTextWithMath(displayMain) + '<span class="blinking-cursor"></span>';
                        scrollToBottom();
                    }

                    finalizeResponse(displayMain);
                
                } else {
                    const data = await response.json().catch(async () => ({ text: await response.text() }));
                    
                    fullResponse = data.choices?.[0]?.message?.content || data.reply || data.response || data.answer || data.message || data.text || JSON.stringify(data);
                    reasoningResponse = data.choices?.[0]?.message?.reasoning_content || '';
                    
                    displayMain = fullResponse;
                    let displayThoughts = reasoningResponse;

                    if (!reasoningResponse && fullResponse.includes('<think>')) {
                        const thinkStart = fullResponse.indexOf('<think>');
                        const thinkEnd = fullResponse.indexOf('</think>');
                        
                        if (thinkEnd !== -1) {
                            displayThoughts = fullResponse.substring(thinkStart + 7, thinkEnd);
                            displayMain = fullResponse.substring(0, thinkStart) + fullResponse.substring(thinkEnd + 8);
                        }
                    }

                    const logs = aiNode.querySelector('#thought-logs');
                    const accordion = aiNode.querySelector('#thought-accordion');
                    if (displayThoughts.trim()) {
                        accordion.classList.remove('hidden');
                        logs.textContent = displayThoughts.trimStart();
                    }

                    aiNode.setAttribute('data-raw', displayMain);
                    
                    let currentIdx = 0;
                    streamingInterval = setInterval(() => {
                        if (currentIdx <= displayMain.length) {
                            const chunk = displayMain.substring(0, currentIdx);
                            contentArea.innerHTML = processTextWithMath(chunk) + '<span class="blinking-cursor"></span>';
                            scrollToBottom();
                            currentIdx += 4;
                        } else {
                            clearInterval(streamingInterval);
                            finalizeResponse(displayMain);
                        }
                    }, 15);
                }

                function finalizeResponse(finalText) {
                    contentArea.innerHTML = processTextWithMath(finalText);
                    renderVisuals(aiNode);
                    
                    // Save to conversational memory
                    addToConversationHistory('user', text);
                    addToConversationHistory('assistant', finalText);
                    
                    isGenerating = false;
                    ui.submitBtn.disabled = false;
                    ui.input.disabled = false;
                    ui.input.focus();
                    scrollToBottom();
                }

            } catch (error) {
                stopThinking(aiNode);
                contentArea.innerHTML = `<div class="text-red-500 font-mono text-sm p-3 bg-red-900/20 border border-red-500/30 rounded-lg">Error connecting to backend: ${error.message}<br><br>Please verify your API URL is correctly set and running.</div>`;
                isGenerating = false;
                ui.submitBtn.disabled = false;
                ui.input.disabled = false;
                scrollToBottom();
            }
        });

    </script>
